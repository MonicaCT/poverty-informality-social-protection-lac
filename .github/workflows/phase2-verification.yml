name: Phase 2 Canonical Verification

on:
  push:
    branches: [phase2-verification]
  workflow_dispatch:

concurrency:
  group: phase2-canonical-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phase2-r:
    name: Run canonical Phase 2 R pipeline
    runs-on: ubuntu-latest

    env:
      PHASE2_BOOTSTRAP_REPS: "999"
      PHASE2_QUANTILE_BOOTSTRAP_REPS: "199"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: true
          packages: |
            any::readr
            any::dplyr
            any::fixest
            any::plm
            any::lmtest
            any::sandwich
            any::knitr
            any::quantreg
            any::fwildclusterboot

      - name: Run canonical Phase 2 script with full console log
        shell: bash
        run: |
          set -o pipefail
          mkdir -p outputs/models
          {
            echo "== Phase 2 canonical verification =="
            echo "UTC timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Git SHA: ${GITHUB_SHA}"
            echo "Git ref: ${GITHUB_REF}"
            echo
            echo "== Rscript version =="
            Rscript --version
            echo
            echo "== R session info before execution =="
            Rscript -e 'print(sessionInfo())'
            echo
            echo "== Installed package versions =="
            Rscript -e 'pkgs <- c("readr","dplyr","fixest","plm","lmtest","sandwich","knitr","quantreg","fwildclusterboot"); print(data.frame(package = pkgs, version = vapply(pkgs, function(p) as.character(packageVersion(p)), character(1))))'
            echo
            echo "== Running code/r/04_phase2_econometrics.R =="
            Rscript code/r/04_phase2_econometrics.R
            echo
            echo "== Generated Phase 2 outputs =="
            find outputs/models -maxdepth 1 -type f -name 'phase2_*' -printf '%f\n' | sort
          } 2>&1 | tee outputs/models/phase2_execution_log.txt

      - name: Upload canonical Phase 2 outputs and log
        uses: actions/upload-artifact@v4
        with:
          name: phase2-canonical-results
          path: |
            outputs/models/phase2_*
            outputs/models/PROVISIONAL_NOTICE.md
          if-no-files-found: error
          retention-days: 30
